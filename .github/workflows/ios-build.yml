name: iOS build (unsigned IPA)

# Manual trigger only. macOS runners burn GitHub Actions minutes at a 10x
# multiplier on private repos (about 200 effective minutes per month on the
# free plan, roughly 8-12 builds), so this must never run on every push.
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build ios --release --no-codesign

      # Package Runner.app into an unsigned IPA that Sideloadly / AltStore
      # can re-sign with a free Apple ID on Windows.
      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -qr commute_guardian_unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: commute-guardian-unsigned-ipa
          path: build/ios/iphoneos/commute_guardian_unsigned.ipa
          retention-days: 14
